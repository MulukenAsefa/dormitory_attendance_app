name: dormitory_attendance_app
description: "Dormitory Attendance Management System - Flutter App for Mobile and Web"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.0
  go_router: ^14.2.7
  
  # State Management
  provider: ^6.1.2
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2
  
  # Location & GPS
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  
  # Device Info & Security
  device_info_plus: ^10.1.2
  local_auth: ^2.3.0
  crypto: ^3.0.5
  
  # Image & Camera
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  
  # Storage & Preferences
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  
  # Network & HTTP
  http: ^1.2.2
  dio: ^5.7.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  
  # Charts & Analytics
  fl_chart: ^0.69.0
  
  # PDF & Excel Export
  pdf: ^3.11.1
  excel: ^4.0.6
  
  # Email
  mailer: ^6.1.2
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Web specific
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Uncomment if you add assets later
  # assets:
  #   - assets/images/
  #   - assets/icons/